<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>
<input id="email" placeholder="email">
<input id="password" placeholder="password" type="password">
<button onclick="login()">Login</button>

<h2>Add Subscription</h2>
<input id="name" placeholder="name">
<input id="cost" placeholder="cost">
<button onclick="addSub()">Add</button>

<h2>Subscriptions</h2>
<button onclick="getSubs()">Get Subscriptions</button>
<ul id="list"></ul>

<script>

async function login() {
  const res = await fetch("http://localhost:3000/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  console.log("Login response:", data);

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login successful");
  } else {
    alert(data.message);
  }
}

async function addSub() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:3000/api/subscriptions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      cost: document.getElementById("cost").value
    })
  });

  const data = await res.json();
  console.log("Add response:", data);

  alert("Added!");
}

async function getSubs() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:3000/api/subscriptions", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  console.log("GET response:", data);

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (Array.isArray(data)) {
    data.forEach(item => {
      const li = document.createElement("li");
      li.innerText = item.name + " - ₹" + item.cost;
      list.appendChild(li);
    });
  } else {
    alert(data.message);
  }
}

</script>

</body>
</html>
